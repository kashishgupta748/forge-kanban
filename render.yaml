services:
  # ─── Backend API (Laravel) ─────────────────────────────────────────
  - type: web
    name: forge-kanban-api
    env: php
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: >
      composer install --no-dev --optimize-autoloader &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      mkdir -p database &&
      touch database/database.sqlite &&
      php artisan migrate --force --seed
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /api/v1/dashboard
    envVars:
      - key: APP_NAME
        value: "Forge Kanban API"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
      - key: FRONTEND_URL
        value: https://forge-kanban.vercel.app
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: SANCTUM_STATEFUL_DOMAINS
        value: forge-kanban.vercel.app
